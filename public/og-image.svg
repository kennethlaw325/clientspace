  <rect x="850" y="325" width="260" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="870" y="345" width="120" height="10" rx="3" fill="#cbd5e1"/>
  <rect x="870" y="365" width="140" height="10" rx="3" fill="#e2e8f0"/>
